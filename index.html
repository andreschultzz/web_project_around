<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the U.S.</title>
    <meta name="description" content="Seu perfil">
    <meta name="author" content="André Schultz">
    <meta name="keywords" content="U.S., USA, United States">
    <link rel="stylesheet" href="pages/index.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <img class="header__logo" src="images/AroundTheUS_logo.png" alt="Logo do Around the U.S. em cor branca">
        </header>
        <main class="content">
            <section class="profile">
                <div class="profile__container">
                    <img class="profile__picture" src="images/ProfilePicture.jpeg" alt="Uma foto de um homem com óculos de sol e uma touca azul, usando um casaco de neve também azul, em um fundo de montanhas e céu azul.">
                    <div class="profile__info">
                        <h1 class="profile__name">Steve Stevens</h1>
                        <p class="profile__class">Amante da Natureza</p>
                        <img class="profile__edit-button" src="images/edit_icon.png" alt="Uma imagem monocromática branca de um lápis, indicando a opção de editar o perfil">
                    </div>
                </div>
                <div class="profile__add-button">
                    <p class="profile__add-button-text">+</p>
                </div>
            </section>
            <section class="form" hidden>
                <div class="form__container">
                    <h2 class="form__title">Editar perfil</h2>
                    <form class="form__body">
                        <input class="form__input form__input_type_name" type="text" value="Steve Stevens" required>
                        <input class="form__input form__input_type_class" type="text" value="Amante da Natureza" required>
                        <button class="form__save-button" type="submit">Salvar</button>
                    </form>
                    <img class="form__close-button" src="images/close_icon.png" alt="Um botão em formato de X">
                </div>
            </section>
            <section class="places">
                <div class="places__item">
                    <img class="places__image" src="images/GlacierNationalPark.jpeg" alt="Vista de um vale verde cercado por montanhas ao entardecer no Parque Nacional de Glacier.">
                    <div class="infobar">
                        <p class="infobar__name">Parque Nacional de Glacier</p>
                        <div class="infobar__button-container">
                            <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                            <img class="infobar__button_active infobar__button_hidden" src="images/like_active.png" alt="Um botão em formato de coração">
                        </div>
                    </div>
                </div>
                <div class="places__item">
                    <img class="places__image" src="images/GrandCanion.jpeg" alt="Uma vista do Grand Canyon com um céu azul e nuvens brancas.">
                    <div class="infobar">
                        <p class="infobar__name">Grand Canion</p>
                        <div class="infobar__button-container">
                            <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                            <img class="infobar__button_active infobar__button_hidden" src="images/like_active.png" alt="Um botão em formato de coração">
                        </div>
                    </div>
                </div>
                <div class="places__item">
                    <img class="places__image" src="images/StarwayToHeaven.jpeg" alt="Uma vista do céu azul com nuvens brancas e uma montanha ao fundo.">
                    <div class="infobar">
                        <p class="infobar__name">Stairway to Heaven</p>
                        <div class="infobar__button-container">
                            <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                            <img class="infobar__button_active infobar__button_hidden" src="images/like_active.png" alt="Um botão em formato de coração">
                        </div>
                    </div>
                </div>
                <div class="places__item">
                    <img class="places__image" src="images/Yosemite.jpeg" alt="Uma vista do Parque Nacional de Yosemite com árvores e montanhas ao fundo.">
                    <div class="infobar">
                        <p class="infobar__name">Yosemite</p>
                        <div class="infobar__button-container">
                            <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                            <img class="infobar__button_active infobar__button_hidden" src="images/like_active.png" alt="Um botão em formato de coração">
                        </div>
                    </div>
                </div>
                <div class="places__item">
                    <img class="places__image" src="images/LakeTahoe.jpeg" alt="Uma vista do Lago Tahoe com montanhas ao fundo.">
                    <div class="infobar">
                        <p class="infobar__name">Lago Tahoe</p>
                        <div class="infobar__button-container">
                            <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                            <img class="infobar__button_active infobar__button_hidden" src="images/like_active.png" alt="Um botão em formato de coração">
                        </div>
                    </div>
                </div>
                <div class="places__item">
                    <img class="places__image" src="images/NiagaraFalls.jpeg" alt="Uma vista das Cataratas do Niágara com um céu azul e nuvens brancas.">
                    <div class="infobar">
                        <p class="infobar__name">Cataratas do Niágara</p>
                        <div class="infobar__button-container">
                            <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                            <img class="infobar__button_active infobar__button_hidden" src="images/like_active.png" alt="Um botão em formato de coração">
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <footer class="footer">
            <p class="footer__copyright">&copy; 2024 Around The U.S.</p>
        </footer>
    </div>
    <script src="scripts/index.js"></script>
</body>
</html>
