<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the U.S.</title>
    <meta name="description" content="Seu perfil">
    <meta name="author" content="André Schultz">
    <meta name="keywords" content="U.S., USA, United States">
    <link rel="stylesheet" href="pages/index.css">
</head>
<body>
    <div class="page">
        <div class="page__container">
            <header class="header">
                <img class="header__logo" src="images/AroundTheUS_logo.png" alt="Logo do Around the U.S. em cor branca">
            </header>
            <main class="content">
                <section class="profile">
                    <div class="profile__container">
                        <img class="profile__picture" src="images/ProfilePicture.jpeg" alt="Uma foto de um homem com óculos de sol e uma touca azul, usando um casaco de neve também azul, em um fundo de montanhas e céu azul.">
                        <div class="profile__info">
                            <h1 class="profile__name">Steve Stevens</h1>
                            <p class="profile__class">Amante da Natureza</p>
                            <img class="profile__edit-button" src="images/edit_icon.png" alt="Uma imagem monocromática branca de um lápis, indicando a opção de editar o perfil">
                        </div>
                    </div>
                    <div class="profile__add-button">
                        <p class="profile__add-button-text">+</p>
                    </div>
                </section>
                <section class="places">
                </section>
            </main>
            <footer class="footer">
                <p class="footer__copyright">&copy; 2026 Around The U.S.</p>
            </footer>
        </div>

        <template id="card-template">
            <div class="places__item">
                <img class="places__trash-button" src="images/Trash.png" alt="Ícone de Lixeira para apagar cartão">
                <img class="places__image" src="" alt="">
                <div class="infobar">
                    <p class="infobar__name"></p>
                    <div class="infobar__button-container">
                        <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração desativado">
                        <img class="infobar__button-active infobar__button-hidden" src="images/like_active.png" alt="Um botão em formato de coração ativado">
                    </div>
                </div>
            </div>
        </template>

        <section class="form" id="edit-profile-form" hidden>
            <div class="form__container">
                <h2 class="form__title">Editar perfil</h2>
                <form class="form__body">
                    <input class="form__input form__input_type_name" type="text" value="Steve Stevens" required>
                    <input class="form__input form__input_type_class" type="text" value="Amante da Natureza" required>
                    <button class="form__save-button" type="submit">Salvar</button>
                </form>
                <img class="form__close-button" src="images/close_icon.png" alt="Um botão em formato de X">
            </div>
        </section>

        <section class="form" id="add-card-form" hidden>
            <div class="form__container">
                <h2 class="form__title">Novo Local</h2>
                <form class="form__body">
                    <input class="form__input form__input_type_title" type="text" placeholder="Título" required>
                    <input class="form__input form__input_type_url" type="url" placeholder="Link da imagem" required>
                    <button class="form__save-button" type="submit">Criar</button>
                </form>
                <img class="form__close-button" src="images/close_icon.png" alt="Um botão em formato de X">
            </div>
        </section>

        <section class="image-popup" id="image-zoom-popup" hidden>
            <div class="image-popup__container">
                <img class="image-popup__close-button" src="images/close_icon.png" alt="Fechar">
                <img class="image-popup__image" src="" alt="">
                <p class="image-popup__caption"></p>
            </div>
        </section>
    </div>
    <script src="scripts/index.js"></script>
</body>
</html>
