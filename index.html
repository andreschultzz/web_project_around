<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the U.S.</title>
    <meta name="description" content="Seu perfil">
    <meta name="author" content="André Schultz">
    <meta name="keywords" content="U.S., USA, United States">
    <link rel="stylesheet" href="">
</head>
<body>
    <header class="header">
        <img class="header__logo" src="images/AroundTheUS_logo.png" alt="Logo do Around the U.S. em cor branca">
    </header>
    <main class="content">
        <section class="profile">
            <img class="profile__picture" src="" alt="">
            <div class="profile__info">
                <h1 class="profile__name"></h1>
                <img class="profile__edit" src="images/edit_icon.png" alt="Uma imagem monocromática branca de um lápis, indicando a opção de editar o perfil">
                <p class="profile__class">Explorador</p>
            </div>
            <p class="profile__add-button">+</p>
        </section>
        <section class="form">
            <form action="">
                <input type="text">
                <input type="text">
                <button></button>
            </form>
        </section>
        <section class="places">
            <div class="places__item">
                <img class="places__image" src="images/GlacierNationalPark.jpg" alt="">
                <div class="infobar">
                    <p class="infobar__name">Parque Nacional de Glacier</p>
                    <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                </div>
            </div>
            <div class="places__item">
                <img class="places__image" src="images/GrandCanion.jpg" alt="">
                <div class="infobar">
                    <p class="infobar__name">Grand Canion</p>
                    <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                </div>
            </div>
            <div class="places__item">
                <img class="places__image" src="images/StarwayToHeaven.jpg" alt="">
                <div class="infobar">
                    <p class="infobar__name">Stairway to Heaven</p>
                    <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                </div>
            </div>
            <div class="places__item">
                <img class="places__image" src="images/Yosemite.jpg" alt="">
                <div class="infobar">
                    <p class="infobar__name">Yosemite</p>
                    <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                </div>
            </div>
            <div class="places__item">
                <img class="places__image" src="images/LakeTahoe.jpg" alt="">
                <div class="infobar">
                    <p class="infobar__name">Lago Tahoe</p>
                    <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                </div>
            </div>
            <div class="places__item">
                <img class="places__image" src="images/NiagaraFalls.jpg" alt="">
                <div class="infobar">
                    <p class="infobar__name">Cataratas do Niágara</p>
                    <img class="infobar__button" src="images/like_disabled.png" alt="Um botão em formato de coração">
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <p class="footer__copyright">&copy; 2024 Around The U.S.</p>
    </footer>
</body>
</html>
